[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@libsql/client", "xlsx", "qrcode"]
  included_files = ["vnos-zaposleni.txt"]

[dev]
  command = "node server.js"
  port = 3000
  targetPort = 3000

# API klici → serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Root → prisotnost
[[redirects]]
  from = "/"
  to = "/prisotnost"
  status = 302

# Prisotnost strani
[[redirects]]
  from = "/prisotnost"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/prisotnost/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/prisotnost/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/prisotnost/pin"
  to = "/pin.html"
  status = 200

[[redirects]]
  from = "/prisotnost/moj-cas"
  to = "/moj-cas.html"
  status = 200

[[redirects]]
  from = "/prisotnost/pin-setup"
  to = "/pin-setup.html"
  status = 200

[[redirects]]
  from = "/prisotnost/qr"
  to = "/qr.html"
  status = 200

[[redirects]]
  from = "/prisotnost/moj-prihod"
  to = "/prisotnost/moj"
  status = 301

[[redirects]]
  from = "/prisotnost/moj"
  to = "/moj.html"
  status = 200

# Moj čas — dedicated employee routes
[[redirects]]
  from = "/moj-cas"
  to = "/prisotnost/pin.html"
  status = 200

[[redirects]]
  from = "/moj-cas/app"
  to = "/prisotnost/moj-cas.html"
  status = 200

[[redirects]]
  from = "/moj-cas/pin-setup"
  to = "/prisotnost/pin-setup.html"
  status = 200

# Stare poti → novi URL-ji (301 preusmeritev)
[[redirects]]
  from = "/login"
  to = "/prisotnost/login"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/prisotnost/admin"
  status = 301

[[redirects]]
  from = "/pin"
  to = "/prisotnost/pin"
  status = 301

[[redirects]]
  from = "/pin-setup"
  to = "/prisotnost/pin-setup"
  status = 301
