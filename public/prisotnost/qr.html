<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prijava – Catering Kukman</title>
  <meta name="theme-color" content="#1a365d" />
  <link rel="stylesheet" href="/qr.css" />
</head>
<body>
  <header>
    <h1>Catering Kukman</h1>
    <p class="qr-datum" id="qr-datum"></p>
  </header>

  <main>
    <div id="qr-napaka" class="qr-napaka hidden">
      <div class="qr-napaka-ikona">⚠</div>
      <h2>QR koda ni veljavna</h2>
      <p>Prosimo, skenirajte aktualno QR kodo na tablici.</p>
    </div>

    <!-- Personaliziran pogled (zaposleni, ki ga telefon že pozna) -->
    <div id="qr-oseba-wrap" class="hidden">
      <p class="qr-navodilo" id="qr-oseba-pozdrav"></p>
      <button id="qr-oseba-btn" class="qr-oseba-btn"></button>
      <button id="qr-nisem-jaz" class="qr-nisem-jaz">Nisem jaz</button>
    </div>

    <!-- Seznam vseh (prvič ali po resetiranju) -->
    <div id="qr-seznam-wrap" class="hidden">
      <h2 class="qr-navodilo">Tapnite vaše ime</h2>
      <div id="qr-seznam" class="qr-seznam"></div>
    </div>

    <div id="qr-rezultat" class="qr-rezultat hidden">
      <div class="qr-check" id="qr-check-ikona">✓</div>
      <h2 id="qr-rez-ime"></h2>
      <p class="qr-rez-tip" id="qr-rez-tip"></p>
      <p class="qr-rez-cas" id="qr-rez-cas"></p>
      <a id="qr-rez-link" href="/prisotnost/moj" class="qr-rez-link hidden">
        Shranite to stran za evidenco in pregled ur →
      </a>
    </div>
  </main>

  <!-- Overlay: Zaključek izmene (po odhodu) -->
  <div id="qr-dodatno-overlay" class="overlay hidden">
    <div class="dialog dialog-dodatno">
      <h2>Zaključek izmene</h2>

      <!-- Dodatno delo (prikazano samo če so ostala dela) -->
      <div id="qr-dela-sekcija" class="hidden">
        <p class="dialog-vprasanje">Ste delali še v drugi vlogi?</p>
        <div class="dodatno-form">
          <select id="qr-dodatno-select" class="dodatno-select"></select>
          <div class="dodatno-cas-row">
            <label>Od<input type="time" id="qr-dodatno-od" /></label>
            <label>Do<input type="time" id="qr-dodatno-do" /></label>
          </div>
          <button id="qr-btn-dodaj-seg" class="btn-dodaj-seg">Dodaj segment</button>
        </div>
        <div id="qr-dodatno-napaka" class="dialog-pin-napaka"></div>
        <div id="qr-dodatno-segmenti" class="dodatno-segmenti"></div>
      </div>

      <!-- Gorivo in nakup (vedno prikazano) -->
      <div class="km-sekcija">
        <div class="km-label">⛽ Gorivo <span class="km-neobvezno">(neobvezno)</span></div>
        <div class="km-vnos-row">
          <input type="number" id="qr-km-input" class="km-input" min="0" step="0.01" placeholder="0.00" />
          <span class="km-enota">€</span>
        </div>
        <div class="km-label" style="margin-top:12px">🛒 Nakup v trgovini <span class="km-neobvezno">(neobvezno)</span></div>
        <div class="km-vnos-row">
          <input type="number" id="qr-strosek-input" class="km-input" min="0" step="0.01" placeholder="0.00" />
          <span class="km-enota">€</span>
        </div>
      </div>

      <button id="qr-btn-zakljuci" class="btn-zakljuci-btn">Zaključi</button>
    </div>
  </div>

  <script src="/qr.js"></script>
</body>
</html>
