<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moj čas – Catering Kukman</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a365d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kukman" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="/pin.css" />
</head>
<body>
  <header>
    <h1>Catering Kukman</h1>
    <p id="header-podnaslov">Moj čas</p>
  </header>
  <main>
    <!-- Korak 1: Izbira imena -->
    <div class="ime-karta" id="ime-karta">
      <p class="navodilo">Kdo si ti?</p>
      <div id="zaposleni-seznam" class="zaposleni-seznam"></div>
    </div>

    <!-- Korak 2: PIN vnos -->
    <div class="pin-card" id="pin-karta" style="display:none">
      <p class="navodilo" id="pin-navodilo">Vnesite PIN</p>
      <div class="pin-prikaz">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
      </div>
      <div id="napaka" class="napaka"></div>
      <div class="tipkovnica">
        <button class="tipka" data-digit="1">1</button>
        <button class="tipka" data-digit="2">2</button>
        <button class="tipka" data-digit="3">3</button>
        <button class="tipka" data-digit="4">4</button>
        <button class="tipka" data-digit="5">5</button>
        <button class="tipka" data-digit="6">6</button>
        <button class="tipka" data-digit="7">7</button>
        <button class="tipka" data-digit="8">8</button>
        <button class="tipka" data-digit="9">9</button>
        <button class="tipka tipka-brisi" id="btn-brisi">⌫</button>
        <button class="tipka" data-digit="0">0</button>
        <button class="tipka tipka-nazaj" id="btn-nazaj">↩</button>
      </div>
    </div>

    <a href="/prisotnost" class="nazaj" id="link-nazaj">← Nazaj na evidenco</a>
  </main>
  <script src="/pin.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
