<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kukman Catering – Jože Kukman, s.p.</title>
  <meta name="description" content="Kukman Catering, Jože Kukman s.p. – Catering storitve za posebne priložnosti. Orkljevec 9a, Mirna Peč." />
  <meta name="theme-color" content="#0f1923" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f2;
      color: #1a1a2e;
      min-height: 100dvh;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(160deg, #1a2332 0%, #0f1923 100%);
      padding: 56px 24px 72px;
      text-align: center;
    }

    .logo-krog {
      width: 148px;
      height: 148px;
      background: #fff;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      overflow: hidden;
      padding: 12px;
    }

    .logo-krog img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .hero-ime {
      color: #fff;
      font-size: 1.75rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .hero-podnaslov {
      color: #c9b96e;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── Kontakt kartica ── */
    .kontakt-wrap {
      max-width: 420px;
      margin: -28px auto 0;
      padding: 0 16px 40px;
    }

    .kontakt-kartica {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      overflow: hidden;
    }

    .kontakt-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border-bottom: 1px solid #f0ede8;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.92rem;
      transition: background 0.12s;
      cursor: pointer;
    }

    .kontakt-item:last-child { border-bottom: none; }
    .kontakt-item:active { background: #faf8f4; }

    .kontakt-ikona {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      background: #f8f4ec;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .kontakt-ikona svg {
      width: 18px;
      height: 18px;
      stroke: #c9a84c;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .kontakt-ikona.social svg { fill: #c9a84c; stroke: none; }

    .kontakt-tekst {
      flex: 1;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
      line-height: 1.3;
    }

    .kontakt-tekst small {
      display: block;
      font-size: 0.72rem;
      color: #aaa;
      margin-bottom: 1px;
    }

    .kontakt-chevron {
      color: #ccc;
      font-size: 1rem;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 8px 16px 32px;
      font-size: 0.68rem;
      color: #bbb;
    }
    footer a { color: #bbb; text-decoration: none; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-krog">
      <img src="/kukman-catering-logo.jpg" alt="Kukman Catering – Jože Kukman, s.p." />
    </div>
    <div class="hero-ime">Kukman Catering</div>
    <div class="hero-podnaslov">Jože Kukman, s.p.</div>
  </div>

  <div class="kontakt-wrap">

        <div class="kontakt-tekst">

        </div>

      <a class="kontakt-item" href="mailto:cateringkukman@gmail.com">
        <div class="kontakt-ikona">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="kontakt-tekst">

      <a class="kontakt-item" href="https://instagram.com/cateringkukman" target="_blank" rel="noopener">
        <div class="kontakt-ikona social">
          <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" fill="#f8f4ec"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="#f8f4ec" stroke-width="2"/></svg>
        </div>
        <div class="kontakt-tekst">

          <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </div>
        <div class="kontakt-tekst">
          <small>Facebook</small>

        </div>

    </div>
  </div>

  <footer>© 2026 Catering Kukman, Jože Kukman s.p. · <a href="/prisotnost/admin">admin</a></footer>
