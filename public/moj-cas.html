<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moj čas – Catering Kukman</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a365d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kukman" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="moj-cas.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1 id="pozdrav">Moj čas</h1>
        <div id="status-danes" class="status-danes"></div>
      </div>
      <button id="btn-odjava" class="btn-odjava">Odjava</button>
    </div>
  </header>

  <main>
    <!-- Naknadno evidentiranje / zahtevki -->
    <section class="card">
      <button id="btn-naknadno" class="btn-naknadno">+ Zahtevaj naknaden vnos</button>
      <div id="zahtevki-seznam"></div>
    </section>

    <!-- Mesečni pregled -->
    <section class="card">
      <div class="mesec-navigacija">
        <button id="btn-prej" class="btn-nav">&#8249;</button>
        <h2 id="mesec-naslov">Junij 2026</h2>
        <button id="btn-naprej" class="btn-nav">&#8250;</button>
      </div>

      <div class="skupaj-mesec">
        <span class="skupaj-label">Skupaj ta mesec</span>
        <span id="skupaj-ure" class="skupaj-vrednost">—</span>
      </div>

      <table class="tabela" id="tabela-dni">
        <thead>
          <tr>
            <th>Dan</th>
            <th>Prihod</th>
            <th>Odhod</th>
            <th class="th-ure">Ure</th>
          </tr>
        </thead>
        <tbody id="tbody-dni"></tbody>
      </table>
      <div id="mesec-prazno" class="prazno" style="display:none">Ni zapisov za ta mesec.</div>

      <!-- Plačilo mesec -->
      <div id="placilo-box" class="placilo-box" style="display:none">
        <div class="placilo-naslov">Obračun</div>
        <div class="placilo-vrstica" id="placilo-osnova-row">
          <span id="placilo-osnova-napis"></span>
          <span id="placilo-osnova-znesek"></span>
        </div>
        <div class="placilo-vrstica" id="placilo-stim-row" style="display:none">
          <span>Stimulacija</span>
          <span id="placilo-stim-znesek"></span>
        </div>
        <div class="placilo-vrstica placilo-skupaj-row">
          <span>Skupaj</span>
          <span id="placilo-skupaj-znesek"></span>
        </div>
      </div>
    </section>

    <!-- Kumulativno po mesecih -->
    <section class="card">
      <h2>Kumulativno po mesecih</h2>
      <table class="tabela" id="tabela-meseci">
        <thead>
          <tr><th>Mesec</th><th class="th-ure">Ure skupaj</th><th class="th-ure" id="th-placilo" style="display:none">Plačilo</th></tr>
        </thead>
        <tbody id="tbody-meseci"></tbody>
      </table>
      <div id="kum-prazno" class="prazno" style="display:none">Še ni podatkov.</div>
    </section>
  </main>

  <!-- Modal: naknadno evidentiranje -->
  <div id="naknadno-overlay" class="modal-overlay hidden">
    <div class="modal-karta">
      <h3>Zahtevek za naknaden vnos</h3>
      <p class="modal-opomba">Vodja bo vaš zahtevek pregledal in odobril.</p>
      <div class="form-skupina">
        <label>Datum</label>
        <input type="date" id="nak-datum" />
      </div>
      <div class="form-skupina">
        <label>Ura</label>
        <input type="time" id="nak-ura" />
      </div>
      <div class="form-skupina">
        <label>Tip</label>
        <div class="radio-skupina">
          <label><input type="radio" name="nak-tip" value="PRIHOD" checked /> Prihod</label>
          <label><input type="radio" name="nak-tip" value="ODHOD" /> Odhod</label>
        </div>
      </div>
      <div class="form-skupina">
        <label>Opomba (neobvezno)</label>
        <input type="text" id="nak-opomba" placeholder="Razlog za naknaden vnos…" maxlength="80" />
      </div>
      <div id="nak-napaka" class="nak-napaka"></div>
      <div class="modal-gumbi">
        <button id="nak-potrdi" class="btn-primarni">Shrani</button>
        <button id="nak-preklic" class="btn-sekundarni">Prekliči</button>
      </div>
    </div>
  </div>

  <script src="moj-cas.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
